# NavTycoon — Cloudflare Pages konfiguráció.
# Hyperscaler MVP Plan 1: D1 (game-state) + PromNET D1 (cross-brand SSO read) + SESSION KV.
# Cron-trigger: 5 perc tick (idő-előre + AI-ticket spawn) + napi reset (UTC 0:00).
#
# Megjegyzés: a Pages config NEM támogatja az `account_id` + `triggers` mezőket
# (ezek a Workers config-jai). Az account_id-t a CF Pages projekt-szintjén tárolja,
# a cron-triggereket pedig a Pages projekt-szintű cron-trigger API-n keresztül
# kell beállítani (lásd Plan 1 §14 deploy lépések). A bindings mezőket a Pages
# build a wrangler.toml-ből discover-eli, de a production deploy_configs-ban
# is megerősítettük REST API-val.

name = "navtycoon"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

[[d1_databases]]
binding = "DB"
database_name = "navtycoon-prod"
database_id = "b044638b-743d-4287-b0ee-181288b8c3a4"

# Cross-brand: PromNET shared user-DB (read-only access SSO-hoz, plan-tier lookuphoz).
[[d1_databases]]
binding = "PROMNET_DB"
database_name = "promnet-prod"
database_id = "6ae31f06-a817-44c9-a0ae-7ef090fb0d43"

# SESSION KV — Astro CF Sessions (platformProxy default-ben ezt keresi).
[[kv_namespaces]]
binding = "SESSION"
id = "cd93081a3571411b9fa782cdd1336c04"

# Workers AI (Llama-3.1-8b + bge-base embeddings)
[ai]
binding = "AI"

# Vectorize index for customer-memory (768-dim, cosine, bge-base)
[[vectorize]]
binding = "VECTORIZE"
index_name = "navtycoon-customer-memory"

# Durable Objects for shift-mode rooms
[[durable_objects.bindings]]
name = "SHIFT_ROOM"
class_name = "ShiftRoomDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ShiftRoomDO"]
